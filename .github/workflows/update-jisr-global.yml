name: Actualizar Teletipo JISR Global Personal

on:
  schedule:
    - cron: '7 8 * * *'
      timezone: 'Europe/Madrid'
    - cron: '7 20 * * *'
      timezone: 'Europe/Madrid'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-jisr-global
  cancel-in-progress: false

jobs:
  update-json:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Preparar Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Probar consultas, puntuación y privacidad
        run: npm test

      - name: Ejecutar agente JISR
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
        run: npm run update

      - name: Validar salida pública
        run: npm run validate

      - name: Guardar cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data
          if git diff --cached --quiet; then
            echo "Sin cambios publicables."
          else
            STATUS=$(node -p "require('./public/data/latest.json').estado_publicacion")
            EVIDENCIAS=$(node -p "require('./public/data/latest.json').estado_fuentes.evidencias_totales")
            FRANJA=$(node -p "require('./public/data/latest.json').edicion.slot")
            git commit -m "data: edición ${FRANJA} · ${STATUS} · ${EVIDENCIAS} evidencias"
            git push
          fi
