<section id="jisr-global-teletipo" aria-label="Teletipo JISR Global Personal">
  <style>
    #jisr-global-teletipo {
      --jisr-bg: #fbfbfa;
      --jisr-fg: #111111;
      --jisr-muted: #666666;
      --jisr-line: #dedbd4;
      --jisr-soft: #f1eee8;
      --jisr-warn: #3b3328;
      --jisr-fill: #111111;
      box-sizing: border-box;
      position: relative;
      left: 50%;
      width: 100vw;
      max-width: 100vw;
      margin-left: -50vw;
      margin-right: -50vw;
      color: var(--jisr-fg);
      background: transparent;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 16px;
      line-height: 1.45;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    #jisr-global-teletipo *,
    #jisr-global-teletipo *::before,
    #jisr-global-teletipo *::after {
      box-sizing: border-box;
    }

    #jisr-global-teletipo .jisr-panel {
      width: min(1240px, calc(100vw - 40px));
      margin: 0 auto;
      border: 1px solid var(--jisr-line);
      border-radius: 8px;
      background: var(--jisr-bg);
      padding: 22px;
    }

    #jisr-global-teletipo .jisr-top,
    #jisr-global-teletipo .jisr-controls,
    #jisr-global-teletipo .jisr-meta,
    #jisr-global-teletipo .jisr-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }

    #jisr-global-teletipo .jisr-top {
      justify-content: space-between;
      padding-bottom: 12px;
      margin-bottom: 18px;
      border-bottom: 1px solid var(--jisr-line);
    }

    #jisr-global-teletipo .jisr-brand {
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
    }

    #jisr-global-teletipo .jisr-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      margin-right: 6px;
      border-radius: 999px;
      background: var(--jisr-fill);
    }

    #jisr-global-teletipo button {
      font: inherit;
    }

    #jisr-global-teletipo .jisr-btn {
      border: 1px solid var(--jisr-line);
      background: var(--jisr-soft);
      color: var(--jisr-fg);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 15px;
      line-height: 1.2;
      cursor: pointer;
    }

    #jisr-global-teletipo .jisr-btn-primary,
    #jisr-global-teletipo .jisr-btn[aria-pressed="true"] {
      background: var(--jisr-fg);
      color: var(--jisr-bg);
      border-color: var(--jisr-fg);
    }

    #jisr-global-teletipo .jisr-meta,
    #jisr-global-teletipo .jisr-muted,
    #jisr-global-teletipo .jisr-small,
    #jisr-global-teletipo .jisr-label {
      color: var(--jisr-muted);
    }

    #jisr-global-teletipo .jisr-title {
      margin: 14px 0 8px;
      max-width: 980px;
      font-size: clamp(27px, 3vw, 42px);
      line-height: 1.08;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    #jisr-global-teletipo .jisr-reading {
      max-width: 980px;
      margin: 0 0 18px;
      font-size: clamp(16px, 1.35vw, 19px);
    }

    #jisr-global-teletipo .jisr-stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin: 16px 0;
    }

    #jisr-global-teletipo .jisr-stat {
      border-top: 1px solid var(--jisr-line);
      padding-top: 10px;
      min-width: 0;
    }

    #jisr-global-teletipo .jisr-stat strong {
      display: block;
      font-size: clamp(24px, 2.5vw, 34px);
      line-height: 1.05;
      font-weight: 600;
    }

    #jisr-global-teletipo .jisr-selected {
      display: grid;
      grid-template-columns: minmax(160px, 260px) 1fr;
      gap: 18px;
      border-top: 1px solid var(--jisr-line);
      border-bottom: 1px solid var(--jisr-line);
      padding: 18px 0;
      margin: 18px 0 14px;
    }

    #jisr-global-teletipo .jisr-score {
      display: grid;
      gap: 8px;
      align-content: start;
    }

    #jisr-global-teletipo .jisr-score-number {
      font-size: clamp(58px, 9vw, 100px);
      line-height: 0.95;
      font-weight: 600;
      letter-spacing: -0.06em;
    }

    #jisr-global-teletipo .jisr-bar {
      width: 100%;
      height: 9px;
      border: 1px solid var(--jisr-line);
      border-radius: 999px;
      overflow: hidden;
      background: #ffffff;
    }

    #jisr-global-teletipo .jisr-bar span {
      display: block;
      width: 0;
      height: 100%;
      background: var(--jisr-fill);
      transition: width 240ms ease;
    }

    #jisr-global-teletipo .jisr-index-name {
      margin: 0 0 8px;
      font-size: clamp(21px, 2vw, 30px);
      line-height: 1.12;
      font-weight: 600;
    }

    #jisr-global-teletipo .jisr-index-reading {
      margin: 0 0 12px;
      font-size: clamp(16px, 1.25vw, 18px);
    }

    #jisr-global-teletipo .jisr-note {
      margin: 10px 0 0;
      border-left: 2px solid var(--jisr-fg);
      padding-left: 12px;
    }

    #jisr-global-teletipo .jisr-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
      margin-top: 16px;
    }

    #jisr-global-teletipo .jisr-tile {
      appearance: none;
      width: 100%;
      min-height: 88px;
      text-align: left;
      border: 1px solid var(--jisr-line);
      background: #ffffff;
      color: var(--jisr-fg);
      border-radius: 8px;
      padding: 10px;
      cursor: pointer;
    }

    #jisr-global-teletipo .jisr-tile[aria-pressed="true"] {
      background: var(--jisr-fg);
      color: var(--jisr-bg);
      border-color: var(--jisr-fg);
    }

    #jisr-global-teletipo .jisr-tile-value {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
      font-weight: 600;
    }

    #jisr-global-teletipo .jisr-tile-name {
      display: block;
      color: inherit;
      opacity: 0.72;
      font-size: 12px;
      line-height: 1.25;
    }

    #jisr-global-teletipo[data-focus="true"] .jisr-grid {
      display: none;
    }

    @media (max-width: 860px) {
      #jisr-global-teletipo .jisr-stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      #jisr-global-teletipo .jisr-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 620px) {
      #jisr-global-teletipo .jisr-panel {
        width: calc(100vw - 20px);
        padding: 14px;
      }

      #jisr-global-teletipo .jisr-controls,
      #jisr-global-teletipo .jisr-btn {
        width: 100%;
      }

      #jisr-global-teletipo .jisr-selected {
        grid-template-columns: 1fr;
      }

      #jisr-global-teletipo .jisr-grid,
      #jisr-global-teletipo .jisr-stats {
        grid-template-columns: 1fr;
      }
    }
  </style>

  <div class="jisr-panel">
    <div class="jisr-top">
      <div class="jisr-brand"><span class="jisr-dot" aria-hidden="true"></span>Teletipo JISR Global Personal</div>
      <div class="jisr-controls">
        <button class="jisr-btn jisr-btn-primary" type="button" data-action="refresh">Actualizar</button>
        <button class="jisr-btn" type="button" data-action="random">Aleatorio</button>
        <button class="jisr-btn" type="button" data-action="auto" aria-pressed="false">Auto</button>
        <button class="jisr-btn" type="button" data-action="focus" aria-pressed="false">Foco</button>
      </div>
    </div>

    <article aria-live="polite" aria-atomic="true">
      <div class="jisr-meta">
        <span data-field="status">Cargando tablero...</span>
        <span>|</span>
        <span data-field="updated">--</span>
        <span>|</span>
        <span data-field="position">IPP -- · IVE --</span>
      </div>

      <h2 class="jisr-title" data-field="headline">Tablero de Indices JISR</h2>
      <p class="jisr-reading" data-field="global-reading">Conectando con el JSON.</p>

      <div class="jisr-stats" aria-label="Resumen JISR">
        <div class="jisr-stat">
          <span class="jisr-label">Tension mundo</span>
          <strong data-field="world-score">--</strong>
        </div>
        <div class="jisr-stat">
          <span class="jisr-label">Indice mas alto</span>
          <strong data-field="highest-score">--</strong>
        </div>
        <div class="jisr-stat">
          <span class="jisr-label">Presion</span>
          <strong data-field="ipp-score">--</strong>
        </div>
        <div class="jisr-stat">
          <span class="jisr-label">Ventaja</span>
          <strong data-field="ive-score">--</strong>
        </div>
      </div>

      <div class="jisr-selected">
        <div class="jisr-score">
          <div class="jisr-score-number" data-field="selected-value">--</div>
          <div class="jisr-bar" aria-hidden="true"><span data-field="selected-bar"></span></div>
          <div class="jisr-row">
            <span data-field="selected-code">---</span>
            <span>|</span>
            <span data-field="selected-level">Nivel</span>
            <span>|</span>
            <span data-field="selected-trend">Tendencia</span>
          </div>
        </div>

        <div>
          <h3 class="jisr-index-name" data-field="selected-name">Indice JISR</h3>
          <p class="jisr-index-reading" data-field="selected-reading">Selecciona un indice para leerlo.</p>
          <p class="jisr-note"><span class="jisr-label">Senal:</span> <span data-field="selected-signal">--</span></p>
          <p class="jisr-note"><span class="jisr-label">Accion JISR:</span> <span data-field="selected-action">--</span></p>
        </div>
      </div>
    </article>

    <div class="jisr-grid" data-field="grid" aria-label="Indices JISR"></div>
  </div>

  <script>
    (function () {
      const JSON_URL = "https://joaquinzapatagarcia.github.io/teletipo-jisr-global-personal/jisr-indices-global-personal.json";
      const root = document.getElementById("jisr-global-teletipo");
      const fields = {
        status: root.querySelector('[data-field="status"]'),
        updated: root.querySelector('[data-field="updated"]'),
        position: root.querySelector('[data-field="position"]'),
        headline: root.querySelector('[data-field="headline"]'),
        globalReading: root.querySelector('[data-field="global-reading"]'),
        worldScore: root.querySelector('[data-field="world-score"]'),
        highestScore: root.querySelector('[data-field="highest-score"]'),
        ippScore: root.querySelector('[data-field="ipp-score"]'),
        iveScore: root.querySelector('[data-field="ive-score"]'),
        selectedValue: root.querySelector('[data-field="selected-value"]'),
        selectedBar: root.querySelector('[data-field="selected-bar"]'),
        selectedCode: root.querySelector('[data-field="selected-code"]'),
        selectedLevel: root.querySelector('[data-field="selected-level"]'),
        selectedTrend: root.querySelector('[data-field="selected-trend"]'),
        selectedName: root.querySelector('[data-field="selected-name"]'),
        selectedReading: root.querySelector('[data-field="selected-reading"]'),
        selectedSignal: root.querySelector('[data-field="selected-signal"]'),
        selectedAction: root.querySelector('[data-field="selected-action"]'),
        grid: root.querySelector('[data-field="grid"]')
      };
      const controls = {
        refresh: root.querySelector('[data-action="refresh"]'),
        random: root.querySelector('[data-action="random"]'),
        auto: root.querySelector('[data-action="auto"]'),
        focus: root.querySelector('[data-action="focus"]')
      };

      const fallbackData = {
        proyecto: "TELETIPO JISR GLOBAL PERSONAL",
        actualizado: "2026-07-04T09:00:00+02:00",
        titular: "El mundo no esta roto, pero cada decision cuesta mas margen.",
        lectura_jisr: "La ventaja no esta en acertarlo todo, sino en llegar sobrio cuando el entorno se vuelve caro, ruidoso y emocional.",
        posicion_personal: {
          ipp: 28,
          ive: 75
        },
        indices: [
          { id: "igp", sigla: "IGP", nombre: "Indice Geopolitico", valor: 82, nivel: "Alto", tendencia: "estable", categoria: "mundo", lectura: "Hay desescalada verbal, pero la paz sigue siendo provisional.", senal: "Conflictos abiertos, negociacion fragil y riesgo de eventos laterales.", accion_jisr: "Mantener prudencia antes de asumir que el riesgo geopolitico ha desaparecido." },
          { id: "ieg", sigla: "IEG", nombre: "Indice Economico Global", valor: 61, nivel: "Al alza", tendencia: "sube", categoria: "economia", lectura: "El crecimiento no se rompe, pero el contexto se ha vuelto mas caro y mas incierto.", senal: "Actividad resistente con menor margen para hogares, empresas y gobiernos.", accion_jisr: "Distinguir fortaleza real de simple inercia economica." },
          { id: "iecv", sigla: "IECv", nombre: "Indice de Energia y Coste de Vida", valor: 68, nivel: "Alto", tendencia: "estable", categoria: "energia", lectura: "El petroleo ya no esta en los picos de marzo, pero sigue lo bastante alto como para contaminar inflacion y expectativas.", senal: "Energia todavia cara y sensible a rutas, seguros y decisiones politicas.", accion_jisr: "No construir planes familiares o empresariales con energia barata como supuesto central." },
          { id: "icsl", sigla: "ICSL", nombre: "Indice de Logistica y Suministro", valor: 73, nivel: "Alto", tendencia: "estable", categoria: "suministro", lectura: "Ormuz se mueve, si, pero lentamente y bajo riesgo; eso sigue siendo friccion.", senal: "Rutas logisticas funcionales pero vulnerables a incidentes y encarecimiento.", accion_jisr: "Valorar disponibilidad, plazos y redundancia como parte del coste real." },
          { id: "imf", sigla: "IMF", nombre: "Indice Monetario-Financiero", valor: 70, nivel: "Alto", tendencia: "sube", categoria: "finanzas", lectura: "La energia ha reabierto la puerta a mas subidas de tipos en EE. UU. y mantiene tension en Europa.", senal: "Mercados dependientes de bancos centrales y expectativas de inflacion.", accion_jisr: "Evitar decisiones apalancadas cuando el precio del dinero vuelve a endurecerse." },
          { id: "icsp", sigla: "ICSP", nombre: "Indice de Clima Social", valor: 67, nivel: "Alto", tendencia: "estable", categoria: "sociedad", lectura: "No domina el panico, pero si un cansancio global que empuja a decisiones peores.", senal: "Fatiga social, malestar economico y menor tolerancia a la incertidumbre.", accion_jisr: "No confundir tranquilidad aparente con estabilidad profunda." },
          { id: "ics", sigla: "ICS", nombre: "Indice de Ciberseguridad", valor: 68, nivel: "Alto y creciente", tendencia: "sube", categoria: "seguridad", lectura: "La guerra fisica ya convive con una guerra digital permanente.", senal: "Aumento de ataques a proveedores, pymes, servicios criticos e identidad digital.", accion_jisr: "Tratar la higiene digital como seguridad familiar y empresarial basica." },
          { id: "isfl", sigla: "ISFL", nombre: "Indice de Seguridad Familiar Local", valor: 26, nivel: "Moderado", tendencia: "estable", categoria: "familia", lectura: "Riesgo fisico bajo; riesgo economico y psicologico por entorno caro y volatil.", senal: "La tension llega mas por coste de vida, agenda mental y decisiones mal calibradas.", accion_jisr: "Proteger caja, energia personal y rutinas domesticas." },
          { id: "ipp", sigla: "IPP", nombre: "Indice de Presion Personal", valor: 28, nivel: "Baja", tendencia: "estable", categoria: "personal", lectura: "La presion personal es baja: sigues llegando a la coyuntura con margen.", senal: "Hay capacidad de espera, lectura y seleccion de oportunidades sin urgencia excesiva.", accion_jisr: "Proteger el margen y no convertir una buena posicion en precipitacion." },
          { id: "ive", sigla: "IVE", nombre: "Indice de Ventaja Estrategica", valor: 75, nivel: "Alto", tendencia: "sube", categoria: "personal", lectura: "Tu sobriedad vale mas precisamente porque el mundo esta menos sobrio.", senal: "La ventaja nace de combinar criterio, paciencia, relato y ejecucion.", accion_jisr: "Convertir lectura del mundo en productos, sesiones y decisiones concretas." }
        ]
      };

      let data = fallbackData;
      let indices = fallbackData.indices.slice();
      let selectedIndex = 0;
      let timer = null;

      function clampScore(value) {
        const number = Number(value);
        if (!Number.isFinite(number)) return 0;
        return Math.max(0, Math.min(100, Math.round(number)));
      }

      function formatDate(value) {
        if (!value) return "Sin fecha";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return value;
        return new Intl.DateTimeFormat("es-ES", {
          day: "2-digit",
          month: "2-digit",
          year: "numeric",
          hour: "2-digit",
          minute: "2-digit"
        }).format(date);
      }

      function average(items) {
        if (!items.length) return 0;
        const total = items.reduce(function (sum, item) {
          return sum + clampScore(item.valor);
        }, 0);
        return Math.round(total / items.length);
      }

      function findIndexById(id) {
        return indices.find(function (item) {
          return item.id === id || String(item.sigla || "").toLowerCase() === id;
        });
      }

      function renderStats() {
        const worldItems = indices.filter(function (item) {
          return item.categoria !== "personal";
        });
        const highest = indices.reduce(function (current, item) {
          return clampScore(item.valor) > clampScore(current.valor) ? item : current;
        }, indices[0]);
        const ipp = findIndexById("ipp") || findIndexById("icp");
        const ive = findIndexById("ive");

        fields.worldScore.textContent = average(worldItems);
        fields.highestScore.textContent = highest ? highest.sigla + " " + clampScore(highest.valor) : "--";
        fields.ippScore.textContent = ipp ? clampScore(ipp.valor) : "--";
        fields.iveScore.textContent = ive ? clampScore(ive.valor) : "--";
        fields.position.textContent = "IPP " + (ipp ? clampScore(ipp.valor) : "--") + " · IVE " + (ive ? clampScore(ive.valor) : "--");
      }

      function renderGrid() {
        const fragment = document.createDocumentFragment();
        fields.grid.replaceChildren();

        indices.forEach(function (item, itemIndex) {
          const button = document.createElement("button");
          button.className = "jisr-tile";
          button.type = "button";
          button.setAttribute("aria-pressed", String(itemIndex === selectedIndex));
          button.setAttribute("aria-label", item.nombre + ": " + clampScore(item.valor));
          button.addEventListener("click", function () {
            selectedIndex = itemIndex;
            renderSelected();
            renderGrid();
          });

          const value = document.createElement("span");
          value.className = "jisr-tile-value";

          const code = document.createElement("span");
          code.textContent = item.sigla || item.id || "--";

          const score = document.createElement("span");
          score.textContent = clampScore(item.valor);

          const name = document.createElement("span");
          name.className = "jisr-tile-name";
          name.textContent = item.nivel || item.nombre || "";

          value.append(code, score);
          button.append(value, name);
          fragment.appendChild(button);
        });

        fields.grid.appendChild(fragment);
      }

      function renderSelected() {
        const item = indices[selectedIndex] || indices[0];
        if (!item) return;
        const score = clampScore(item.valor);

        fields.selectedValue.textContent = score;
        fields.selectedBar.style.width = score + "%";
        fields.selectedCode.textContent = item.sigla || item.id || "--";
        fields.selectedLevel.textContent = item.nivel || "Sin nivel";
        fields.selectedTrend.textContent = "Tendencia " + (item.tendencia || "sin dato");
        fields.selectedName.textContent = item.nombre || "Indice JISR";
        fields.selectedReading.textContent = item.lectura || "";
        fields.selectedSignal.textContent = item.senal || "Sin senal definida.";
        fields.selectedAction.textContent = item.accion_jisr || "Sin accion definida.";
      }

      function renderAll(sourceLabel) {
        indices = Array.isArray(data.indices) ? data.indices.slice() : [];
        if (!indices.length) indices = fallbackData.indices.slice();
        selectedIndex = Math.min(selectedIndex, indices.length - 1);

        fields.status.textContent = sourceLabel || data.proyecto || "Tablero JISR";
        fields.updated.textContent = formatDate(data.actualizado);
        fields.headline.textContent = data.titular || "Tablero de Indices JISR";
        fields.globalReading.textContent = data.lectura_jisr || "";

        renderStats();
        renderSelected();
        renderGrid();
      }

      function randomIndex() {
        if (!indices.length) return;
        selectedIndex = Math.floor(Math.random() * indices.length);
        renderSelected();
        renderGrid();
      }

      async function loadData() {
        fields.status.textContent = "Actualizando...";
        try {
          const response = await fetch(JSON_URL + "?v=" + Date.now());
          if (!response.ok) throw new Error("No se pudo leer el JSON");
          data = await response.json();
          renderAll("GitHub JSON");
        } catch (error) {
          data = fallbackData;
          renderAll("Modo prototipo");
        }
      }

      function toggleAuto() {
        const enabled = controls.auto.getAttribute("aria-pressed") !== "true";
        controls.auto.setAttribute("aria-pressed", String(enabled));

        if (enabled) {
          timer = window.setInterval(randomIndex, 30000);
        } else if (timer) {
          window.clearInterval(timer);
          timer = null;
        }
      }

      function toggleFocus() {
        const enabled = controls.focus.getAttribute("aria-pressed") !== "true";
        controls.focus.setAttribute("aria-pressed", String(enabled));
        root.dataset.focus = String(enabled);
      }

      controls.refresh.addEventListener("click", loadData);
      controls.random.addEventListener("click", randomIndex);
      controls.auto.addEventListener("click", toggleAuto);
      controls.focus.addEventListener("click", toggleFocus);

      renderAll("Modo prototipo");
      loadData();
    }());
  </script>
</section>
